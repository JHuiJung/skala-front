        <header>
            <h1 class="fade-in">👤 회원가입</h1>
            <p>아래 정보를 입력하고 가입해주세요.</p>
        </header>

        <main>
            <form action="signUpResult.html" method="get">
                <fieldset>
                    <legend>기본 정보</legend>

                    <div class="form-field">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" placeholder="예) 홍길동" required>
                    </div>

                    <div class="form-field">
                        <label for="email-id">이메일</label>
                        <div class="email-input-group">
                            <input type="text" id="email-id" name="email-id" placeholder="예) example" required>
                            <span>@</span>
                            <select id="email-domain" name="email-domain" required>
                                <option value="naver.com">naver.com</option>
                                <option value="gmail.com">gmail.com</option>
                                <option value="daum.net">daum.net</option>
                                <option value="hanmail.net">hanmail.net</option>
                                <option value="kakao.com">kakao.com</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-field">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" placeholder="8자 이상 입력" required>
                    </div>

                    <div class="form-field">
                        <label for="birth">생년월일</label>
                        <input type="date" id="birth" name="birth">
                    </div>
                </fieldset>

                <br>

                <fieldset>
                    <legend>추가 정보</legend>

                    <div class="form-field">
                        <label>성별</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="none" checked> 선택 안 함</label>
                            <label><input type="radio" name="gender" value="male"> 남성</label>
                            <label><input type="radio" name="gender" value="female"> 여성</label>
                        </div>
                    </div>

                    <div class="form-field">
                        <label>직업</label>
                        <div class="radio-group">
                            <label><input type="radio" name="job" value="student" checked> 학생</label>
                            <label><input type="radio" name="job" value="developer"> 개발자</label>
                            <label><input type="radio" name="job" value="designer"> 디자이너</label>
                            <label><input type="radio" name="job" value="etc"> 기타</label>
                        </div>
                    </div>

                    <div class="form-field">
                        <label for="intro">자기소개</label>
                        <textarea id="intro" name="intro" rows="4" cols="40" placeholder="간단한 자기소개를 입력해주세요."></textarea>
                    </div>
                </fieldset>

                <button type="submit">가입하기</button>
                <button type="reset">초기화</button>
            </form>
