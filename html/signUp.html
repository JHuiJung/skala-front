    <header>
        <h1>👤 회원가입</h1>
        <p>아래 정보를 입력하고 가입해주세요.</p>
    </header>

    <main>
        <form action="signUpResult.html" method="get">
            <fieldset>
                <legend>기본 정보</legend>

                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
                <br>

                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
                <br>

                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력" required>
                <br>

                <label for="birth">생년월일</label>
                <input type="date" id="birth" name="birth">
            </fieldset>

            <fieldset>
                <legend>추가 정보</legend>

                <label for="gender">성별</label>
                <select id="gender" name="gender">
                    <option value="none">선택 안 함</option>
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                </select>
                <br>

                <label for="job">직업</label>
                <select id="job" name="job">
                    <option value="student">학생</option>
                    <option value="developer">개발자</option>
                    <option value="designer">디자이너</option>
                    <option value="etc">기타</option>
                </select>
                <br>

                <label for="intro">자기소개</label>
                <br>
                <textarea id="intro" name="intro" rows="4" cols="40" placeholder="간단한 자기소개를 입력해주세요."></textarea>
            </fieldset>

            <input type="submit" value="가입하기">
            <input type="reset" value="초기화">
        </form>
    </main>

    <footer>
        <p><small>&copy; 2026 나의 포털</small></p>
    </footer>
    </div>
    <script src="../script/navScroll.js"></script>
</body>
